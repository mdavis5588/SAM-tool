---
# =============================================================================
# Oracle SAM - Discovery Playbook
# Collects all data needed to calculate Oracle processor licence requirements:
#   - Server / OS metadata
#   - Physical CPU topology (sockets, cores per socket, processor model)
#   - Oracle database instances, editions and installed options
#   - Virtualisation information (VMware vCPU or bare-metal)
# Results are written into PostgreSQL via the sam_loader role.
# =============================================================================

- name: Oracle SAM discovery
  hosts: oracle_servers
  gather_facts: true        # populates ansible_processor_*, ansible_virtualization_*
  become: false             # run as oracle_discovery user; sudo only where needed
  serial: 10                # limit parallel connections

  vars:
    sam_run_id: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}-{{ inventory_hostname | hash('md5') | truncate(6, true, '') }}"
    oracle_base_paths:
      - /u01/app/oracle
      - /oracle
      - /opt/oracle
    oratab_paths:
      - /etc/oratab
      - /var/opt/oracle/oratab

  tasks:

    # ------------------------------------------------------------------
    # 1. SERVER METADATA
    # ------------------------------------------------------------------
    - name: Collect OS release details
      ansible.builtin.command: cat /etc/os-release
      register: os_release_raw
      changed_when: false
      ignore_errors: true

    - name: Collect system uptime
      ansible.builtin.command: uptime -p
      register: uptime_raw
      changed_when: false
      ignore_errors: true

    # ------------------------------------------------------------------
    # 2. CPU / PROCESSOR TOPOLOGY
    #    lscpu gives us the authoritative socket/core/thread picture.
    #    We also read /proc/cpuinfo for the exact model string which
    #    is needed to match the Oracle Processor Core Factor Table.
    # ------------------------------------------------------------------
    - name: Run lscpu for CPU topology
      ansible.builtin.command: lscpu --json
      register: lscpu_output
      changed_when: false
      ignore_errors: true

    - name: Read /proc/cpuinfo for processor model string
      ansible.builtin.slurp:
        src: /proc/cpuinfo
      register: cpuinfo_raw
      ignore_errors: true

    - name: Parse CPU topology from lscpu JSON
      ansible.builtin.set_fact:
        cpu_topology: "{{ lscpu_output.stdout | from_json }}"
      when: lscpu_output.rc == 0

    - name: Extract key CPU fields
      ansible.builtin.set_fact:
        sam_cpu_sockets:        "{{ (cpu_topology.lscpu | selectattr('field', 'equalto', 'Socket(s):') | map(attribute='data') | first | int) if cpu_topology is defined else ansible_processor_count }}"
        sam_cpu_cores_per_socket: "{{ (cpu_topology.lscpu | selectattr('field', 'equalto', 'Core(s) per socket:') | map(attribute='data') | first | int) if cpu_topology is defined else (ansible_processor_cores | default(1)) }}"
        sam_cpu_threads_per_core: "{{ (cpu_topology.lscpu | selectattr('field', 'equalto', 'Thread(s) per core:') | map(attribute='data') | first | int) if cpu_topology is defined else 1 }}"
        sam_cpu_architecture:   "{{ (cpu_topology.lscpu | selectattr('field', 'equalto', 'Architecture:') | map(attribute='data') | first) if cpu_topology is defined else ansible_architecture }}"
        sam_cpu_model:          "{{ ansible_processor[2] | default('Unknown') }}"
        sam_total_physical_cores: "{{ sam_cpu_sockets | int * sam_cpu_cores_per_socket | int }}"

    # ------------------------------------------------------------------
    # 3. VIRTUALISATION DETECTION
    #    Oracle requires you to track whether the host is bare-metal,
    #    a VMware VM (which can use soft-partitioning under VSPP),
    #    or another hypervisor (counts as all physical cores licensed).
    # ------------------------------------------------------------------
    - name: Detect virtualisation type
      ansible.builtin.set_fact:
        sam_virt_type: "{{ ansible_virtualization_type | default('physical') }}"
        sam_virt_role: "{{ ansible_virtualization_role | default('host') }}"

    - name: Check for VMware tools (confirms VMware VM)
      ansible.builtin.command: which vmware-toolsd
      register: vmware_tools_check
      changed_when: false
      ignore_errors: true

    - name: Set VMware flag
      ansible.builtin.set_fact:
        sam_is_vmware: "{{ vmware_tools_check.rc == 0 or sam_virt_type in ['VMware', 'vmware'] }}"

    # ------------------------------------------------------------------
    # 4. ORACLE INSTANCE DISCOVERY
    #    Parse oratab for all registered instances, then for each one
    #    connect to the database to get edition, version and options.
    # ------------------------------------------------------------------
    - name: Find oratab file
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ oratab_paths }}"
      register: oratab_stat

    - name: Read oratab
      ansible.builtin.slurp:
        src: "{{ item.stat.path }}"
      loop: "{{ oratab_stat.results | selectattr('stat.exists') | list }}"
      register: oratab_content
      when: item.stat.exists

    - name: Parse oratab entries
      ansible.builtin.set_fact:
        oracle_instances_raw: >-
          {{
            (oratab_content.results
              | selectattr('content', 'defined')
              | map(attribute='content')
              | map('b64decode')
              | join('\n')
            ).split('\n')
            | reject('match', '^\\s*#')
            | reject('match', '^\\s*$')
            | map('regex_findall', '^([^:]+):([^:]+):([YyNn])')
            | select
            | map('first')
            | list
          }}

    - name: Set instance list fact
      ansible.builtin.set_fact:
        sam_oracle_instances: >-
          {{
            oracle_instances_raw | map('zip', ['sid', 'oracle_home', 'autostart'])
            | map('community.general.dict')
            | list
          }}
      when: oracle_instances_raw is defined

    - name: Query each Oracle instance for edition and version
      ansible.builtin.shell: |
        export ORACLE_HOME="{{ item.oracle_home }}"
        export ORACLE_SID="{{ item.sid }}"
        export PATH="$ORACLE_HOME/bin:$PATH"
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF
        SELECT
          '{"version":"'     || version         || '",'  ||
          '"edition":"'      || edition          || '",'  ||
          '"db_name":"'      || name             || '",'  ||
          '"platform_name":"'|| platform_name    || '",'  ||
          '"created":"'      || TO_CHAR(created,'YYYY-MM-DD') || '"}'
        FROM   v$instance  i
        CROSS  JOIN v$database  d;
        EXIT;
        EOF
      loop: "{{ sam_oracle_instances | default([]) }}"
      loop_control:
        label: "{{ item.sid }}"
      register: sqlplus_results
      become: true
      become_user: oracle
      ignore_errors: true
      changed_when: false

    - name: Query installed options per instance
      ansible.builtin.shell: |
        export ORACLE_HOME="{{ item.oracle_home }}"
        export ORACLE_SID="{{ item.sid }}"
        export PATH="$ORACLE_HOME/bin:$PATH"
        sqlplus -s / as sysdba << 'EOF'
        SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF
        SELECT '{"option":"' || comp_name || '","version":"' || version || '","status":"' || status || '"}'
        FROM   dba_registry
        WHERE  status IN ('VALID','OPTION OFF')
        ORDER BY comp_name;
        EXIT;
        EOF
      loop: "{{ sam_oracle_instances | default([]) }}"
      loop_control:
        label: "{{ item.sid }}"
      register: options_results
      become: true
      become_user: oracle
      ignore_errors: true
      changed_when: false

    # ------------------------------------------------------------------
    # 5. ASSEMBLE FACT PAYLOAD
    # ------------------------------------------------------------------
    - name: Assemble SAM discovery payload
      ansible.builtin.set_fact:
        sam_payload:
          run_id:         "{{ sam_run_id }}"
          hostname:       "{{ inventory_hostname }}"
          fqdn:           "{{ ansible_fqdn }}"
          ip_address:     "{{ ansible_default_ipv4.address | default('') }}"
          os_family:      "{{ ansible_os_family }}"
          os_distribution: "{{ ansible_distribution }}"
          os_version:     "{{ ansible_distribution_version }}"
          environment:    "{{ sam_environment | default('unknown') }}"
          criticality:    "{{ sam_criticality | default('unknown') }}"
          cpu_sockets:    "{{ sam_cpu_sockets | int }}"
          cpu_cores_per_socket: "{{ sam_cpu_cores_per_socket | int }}"
          cpu_threads_per_core: "{{ sam_cpu_threads_per_core | int }}"
          total_physical_cores: "{{ sam_total_physical_cores | int }}"
          cpu_model:      "{{ sam_cpu_model }}"
          cpu_architecture: "{{ sam_cpu_architecture }}"
          virt_type:      "{{ sam_virt_type }}"
          virt_role:      "{{ sam_virt_role }}"
          is_vmware:      "{{ sam_is_vmware | bool }}"
          total_ram_mb:   "{{ ansible_memtotal_mb | default(0) }}"
          discovered_at:  "{{ ansible_date_time.iso8601 }}"
          instances: >-
            {{
              sqlplus_results.results
              | selectattr('rc', 'equalto', 0)
              | map(attribute='stdout')
              | map('trim')
              | map('from_json')
              | list
            }}

    # ------------------------------------------------------------------
    # 6. WRITE TO POSTGRESQL
    # ------------------------------------------------------------------
    - name: Load SAM payload into PostgreSQL
      community.postgresql.postgresql_query:
        db:       "{{ sam_db_name }}"
        login_host: "{{ sam_db_host }}"
        login_port: "{{ sam_db_port }}"
        login_user: "{{ sam_db_user }}"
        login_password: "{{ sam_db_password }}"
        query: "SELECT sam.upsert_server_discovery(%(payload)s::jsonb)"
        named_args:
          payload: "{{ sam_payload | to_json }}"
      delegate_to: localhost
      ignore_errors: true

    - name: Print discovery summary
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }} —
          Sockets: {{ sam_cpu_sockets }},
          Cores/socket: {{ sam_cpu_cores_per_socket }},
          Total cores: {{ sam_total_physical_cores }},
          CPU: {{ sam_cpu_model }},
          Virt: {{ sam_virt_type }},
          Oracle instances: {{ sam_oracle_instances | default([]) | length }}
