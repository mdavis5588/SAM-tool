---
# Oracle SAM - Ansible Inventory
# Group your Oracle hosts here. Tags flow through to the database
# and appear as filterable dimensions in Power BI.

all:
  children:
    oracle_servers:
      children:

        oracle_production:
          vars:
            sam_environment: production
            sam_criticality: high
          hosts:
            db-prod-01.example.com:
              ansible_user: oracle_discovery
            db-prod-02.example.com:
              ansible_user: oracle_discovery

        oracle_non_production:
          vars:
            sam_environment: non_production
            sam_criticality: low
          children:
            oracle_dev:
              vars:
                sam_environment: development
              hosts:
                db-dev-01.example.com:
            oracle_test:
              vars:
                sam_environment: test
              hosts:
                db-test-01.example.com:

  vars:
    # SSH / connection defaults
    ansible_connection: ssh
    ansible_python_interpreter: /usr/bin/python3

    # SAM PostgreSQL target (used by the loader role)
    sam_db_host: "{{ lookup('env', 'SAM_DB_HOST') | default('localhost') }}"
    sam_db_port: 5432
    sam_db_name: oracle_sam
    sam_db_user: sam_loader
    sam_db_password: "{{ lookup('env', 'SAM_DB_PASSWORD') }}"
