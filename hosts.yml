---
# Oracle SAM - Multi-Client Inventory Template
# Each client gets its own group with sam_client_schema set.
# The schema name must match what was created by sam_admin.provision_client().

all:
  children:

    # =========================================================
    # CLIENT: Acme Corp  (schema: client_acme)
    # =========================================================
    client_acme_oracle:
      vars:
        sam_client_schema: client_acme
        sam_environment:   production
        sam_criticality:   high
        sam_datacenter:    DC-EAST
        ansible_user:      oracle_discovery
      hosts:
        acme-db-prod-01.acme.example.com:
        acme-db-prod-02.acme.example.com:

    client_acme_weblogic:
      vars:
        sam_client_schema: client_acme
        sam_environment:   production
        sam_criticality:   high
        sam_datacenter:    DC-EAST
        ansible_user:      oracle_discovery
      hosts:
        acme-wls-prod-01.acme.example.com:
        acme-wls-prod-02.acme.example.com:

    client_acme_nonprod:
      vars:
        sam_client_schema: client_acme
        sam_environment:   non_production
        sam_criticality:   low
        sam_datacenter:    DC-EAST
        ansible_user:      oracle_discovery
      hosts:
        acme-db-dev-01.acme.example.com:
        acme-wls-dev-01.acme.example.com:

    # =========================================================
    # CLIENT: Globex Corp  (schema: client_globex)
    # =========================================================
    client_globex_oracle:
      vars:
        sam_client_schema: client_globex
        sam_environment:   production
        sam_criticality:   high
        sam_datacenter:    DC-WEST
        ansible_user:      sam_discover
      hosts:
        globex-db-01.globex.example.com:

    client_globex_weblogic:
      vars:
        sam_client_schema: client_globex
        sam_environment:   production
        sam_criticality:   high
        sam_datacenter:    DC-WEST
        ansible_user:      sam_discover
      hosts:
        globex-wls-01.globex.example.com:

  vars:
    # Connection defaults
    ansible_connection:          ssh
    ansible_python_interpreter:  /usr/bin/python3

    # SAM PostgreSQL target (all clients share the same database)
    sam_db_host:     "{{ lookup('env', 'SAM_DB_HOST') | default('localhost') }}"
    sam_db_port:     5432
    sam_db_name:     oracle_sam
    sam_db_user:     sam_loader
    sam_db_password: "{{ lookup('env', 'SAM_DB_PASSWORD') }}"
